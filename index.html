<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PMIRS Summit 2026 · Gestão</title>
  <meta name="description" content="App interno de gestão do PMIRS Summit 2026 — Tecnopuc, Porto Alegre, 13–14 nov 2026." />

  <!-- Fontes do design (Claude Design): Fraunces (títulos) + Manrope (texto) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/tokens.css?v=2" />
  <link rel="stylesheet" href="css/app.css?v=2" />
</head>

<body>
  <div class="app">
    <!-- ===================== Topbar ===================== -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img class="brand-logo" src="assets/pmirs-horizontal-white.png" alt="PMI Rio Grande do Sul Chapter" />
          <span class="brand-sep">·</span>
          <span class="brand-sub">Summit 2026 · Gestão</span>
        </div>

        <div class="topbar-actions">
          <span
            id="save-status"
            class="save-status"
            data-state="idle"
            aria-live="polite"
          >
            <span class="dot" aria-hidden="true"></span>
            <span class="save-label">salvo automaticamente</span>
          </span>

          <button id="btn-theme" class="btn sm" type="button" title="Alternar dark/light mode">🌙</button>

          <button id="btn-export" class="btn sm" type="button" title="Exportar backup JSON">
            <span aria-hidden="true">⭳</span> <span class="label">Exportar</span>
          </button>

          <button id="btn-import" class="btn sm" type="button" title="Importar backup JSON">
            <span aria-hidden="true">⭱</span> <span class="label">Importar</span>
          </button>
        </div>
      </div>

      <!-- ===================== Abas ===================== -->
      <nav class="tabs" aria-label="Seções da gestão">
        <div class="tabs-inner" role="tablist">
          <!-- Visão Geral — standalone -->
          <button class="tab-btn" type="button" role="tab" data-tab="tab-visao" aria-selected="true" aria-controls="tab-visao">Visão Geral</button>

          <!-- Planejamento: Cronograma, EAP, Disciplinas -->
          <div class="tab-group" role="none">
            <button class="tab-group__btn" type="button" aria-haspopup="true" aria-expanded="false">
              Planejamento <span class="tab-group__arrow" aria-hidden="true">▾</span>
            </button>
            <div class="tab-group__menu" hidden role="none">
              <button class="tab-btn" type="button" role="tab" data-tab="tab-cronograma" aria-selected="false" aria-controls="tab-cronograma" tabindex="-1">Cronograma</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-eap" aria-selected="false" aria-controls="tab-eap" tabindex="-1">EAP</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-disciplinas" aria-selected="false" aria-controls="tab-disciplinas" tabindex="-1">Disciplinas</button>
            </div>
          </div>

          <!-- Financeiro: Financeiro, Contratações -->
          <div class="tab-group" role="none">
            <button class="tab-group__btn" type="button" aria-haspopup="true" aria-expanded="false">
              Financeiro <span class="tab-group__arrow" aria-hidden="true">▾</span>
            </button>
            <div class="tab-group__menu" hidden role="none">
              <button class="tab-btn" type="button" role="tab" data-tab="tab-financeiro" aria-selected="false" aria-controls="tab-financeiro" tabindex="-1">Financeiro</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-contratacoes" aria-selected="false" aria-controls="tab-contratacoes" tabindex="-1">Contratações</button>
            </div>
          </div>

          <!-- Conteúdo: Palestrantes, Prospecção -->
          <div class="tab-group" role="none">
            <button class="tab-group__btn" type="button" aria-haspopup="true" aria-expanded="false">
              Conteúdo <span class="tab-group__arrow" aria-hidden="true">▾</span>
            </button>
            <div class="tab-group__menu" hidden role="none">
              <button class="tab-btn" type="button" role="tab" data-tab="tab-palestrantes" aria-selected="false" aria-controls="tab-palestrantes" tabindex="-1">Palestrantes</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-prospeccao" aria-selected="false" aria-controls="tab-prospeccao" tabindex="-1">Palestrantes</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-patrocinio" aria-selected="false" aria-controls="tab-patrocinio" tabindex="-1">Patrocínio</button>
            </div>
          </div>

          <!-- Pessoas: Equipe, Voluntários -->
          <div class="tab-group" role="none">
            <button class="tab-group__btn" type="button" aria-haspopup="true" aria-expanded="false">
              Pessoas <span class="tab-group__arrow" aria-hidden="true">▾</span>
            </button>
            <div class="tab-group__menu" hidden role="none">
              <button class="tab-btn" type="button" role="tab" data-tab="tab-equipe" aria-selected="false" aria-controls="tab-equipe" tabindex="-1">Equipe</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-voluntarios" aria-selected="false" aria-controls="tab-voluntarios" tabindex="-1">Voluntários</button>
            </div>
          </div>

          <!-- Operação: Reuniões, Documentos, Relatórios -->
          <div class="tab-group" role="none">
            <button class="tab-group__btn" type="button" aria-haspopup="true" aria-expanded="false">
              Operação <span class="tab-group__arrow" aria-hidden="true">▾</span>
            </button>
            <div class="tab-group__menu" hidden role="none">
              <button class="tab-btn" type="button" role="tab" data-tab="tab-reunioes" aria-selected="false" aria-controls="tab-reunioes" tabindex="-1">Reuniões</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-documentos" aria-selected="false" aria-controls="tab-documentos" tabindex="-1">Documentos</button>
              <button class="tab-btn" type="button" role="tab" data-tab="tab-relatorios" aria-selected="false" aria-controls="tab-relatorios" tabindex="-1">Relatórios</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- ===================== Conteúdo ===================== -->
    <main class="container">
      <!-- Faixa de avisos globais (ex.: falha de fetch) -->
      <div id="app-banner"></div>

      <section
        id="tab-visao"
        class="tab-panel"
        role="tabpanel"
        aria-label="Visão Geral"
      >
        <div class="placeholder">Carregando…</div>
      </section>

      <section
        id="tab-cronograma"
        class="tab-panel"
        role="tabpanel"
        aria-label="Cronograma"
        hidden
      >
        <div class="placeholder">Carregando…</div>
      </section>

      <section
        id="tab-financeiro"
        class="tab-panel"
        role="tabpanel"
        aria-label="Financeiro"
        hidden
      >
        <div class="placeholder">Carregando…</div>
      </section>

      <section
        id="tab-contratacoes"
        class="tab-panel"
        role="tabpanel"
        aria-label="Contratações"
        hidden
      >
        <div class="placeholder">Carregando…</div>
      </section>

      <section
        id="tab-disciplinas"
        class="tab-panel"
        role="tabpanel"
        aria-label="Disciplinas"
        hidden
      >
        <div class="placeholder">Carregando…</div>
      </section>

      <section
        id="tab-eap"
        class="tab-panel"
        role="tabpanel"
        aria-label="EAP"
        hidden
      >
        <div class="placeholder">Carregando…</div>
      </section>

      <section id="tab-reunioes" class="tab-panel" role="tabpanel" aria-label="Reuniões" hidden><div class="placeholder">Carregando…</div></section>
      <section id="tab-equipe" class="tab-panel" role="tabpanel" aria-label="Equipe" hidden><div class="placeholder">Carregando…</div></section>
      <section id="tab-documentos" class="tab-panel" role="tabpanel" aria-label="Documentos" hidden><div class="placeholder">Carregando…</div></section>
      <section id="tab-relatorios" class="tab-panel" role="tabpanel" aria-label="Relatórios" hidden><div class="placeholder">Carregando…</div></section>
      <section id="tab-palestrantes" class="tab-panel" role="tabpanel" aria-label="Palestrantes" hidden><div class="placeholder">Carregando…</div></section>
      <section id="tab-prospeccao" class="tab-panel" role="tabpanel" aria-label="Prospecção de Palestrantes" hidden><div class="placeholder">Carregando…</div></section>
      <section id="tab-voluntarios" class="tab-panel" role="tabpanel" aria-label="Voluntários" hidden><div class="placeholder">Carregando…</div></section>
      <section id="tab-patrocinio" class="tab-panel" role="tabpanel" aria-label="Prospecção de Patrocínio" hidden><div class="placeholder">Carregando…</div></section>
    </main>
  </div>

  <!-- Input oculto para importação de backup -->
  <input type="file" id="import-file" hidden accept="application/json" />

  <!-- Camada central -->
  <script src="js/app.js?v=2" defer></script>

  <!-- Módulos (preenchidos por outros agentes; ainda podem não existir) -->
  <script src="js/visao-geral.js?v=2" defer></script>
  <script src="js/cronograma.js?v=2" defer></script>
  <script src="js/financeiro.js?v=3" defer></script>
  <script src="js/contratacoes.js?v=2" defer></script>
  <script src="js/disciplinas.js?v=2" defer></script>
  <script src="js/eap.js?v=2" defer></script>
  <script src="js/reunioes.js?v=2" defer></script>
  <script src="js/equipe.js?v=2" defer></script>
  <script src="js/documentos.js?v=2" defer></script>
  <script src="js/relatorios.js?v=2" defer></script>
  <script src="js/palestrantes.js?v=1" defer></script>
  <script src="js/prospeccao.js?v=1" defer></script>
  <script src="js/voluntarios.js?v=1" defer></script>
  <script src="js/patrocinio.js?v=2" defer></script>
</body>
</html>
